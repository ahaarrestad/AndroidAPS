name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * *' # Kjører hver natt
  workflow_dispatch:    # Lar deg starte manuelt

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Fork with Upstream
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/merge-upstream \
            -d '{"branch":"master"}')

          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 202 ]; then
            echo "Status $RESPONSE: Synkronisering vellykket."
            echo "SYNC_UPDATED=true" >> $GITHUB_ENV
          elif [ "$RESPONSE" -eq 409 ]; then
            echo "Status $RESPONSE: Konflikt oppdaget. Du må merge manuelt i nettleseren."
            exit 1
          else
            echo "Status $RESPONSE: Noe gikk galt med synkroniseringen!"
            exit 1
          fi

      - name: Trigger AAPS CI build
        if: env.SYNC_UPDATED == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/aaps-ci.yml/dispatches \
            -d '{"ref":"master"}'
          echo "AAPS CI build triggered."
